name: Collect wait times

# ライブ待ち時間を定期収集して data/ にコミットする
on:
  schedule:
    # cron は UTC。毎時 :07 と :37（UTC 0〜13 ≒ JST 9〜22）に実行。
    # ※ :00 ちょうどは混雑で間引かれやすいため避ける。
    # ※ 履歴(attrWait)は1回で当日全体を取得できるため、多少間引かれても当日分は揃う。
    - cron: "7,37 0-13 * * *"
  workflow_dispatch: {} # 手動実行も可能（テスト用）

# data/ への push に必要
permissions:
  contents: write

# 収集ジョブが重ならないようにする
concurrency:
  group: collect-wait-times
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect live snapshot (current)
        run: node scripts/collect-info.mjs

      - name: Collect daily history (full-day series)
        run: node scripts/collect-history.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし（スキップ）"
          else
            git commit -m "data: collect wait times $(date -u +%Y-%m-%dT%H:%MZ)"
            # 同期ワークフローと push が競合しうるので rebase してリトライ
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || { echo "push retry $i"; sleep 5; }
            done
          fi
