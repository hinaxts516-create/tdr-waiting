name: Collect wait times

# 当日の履歴(30分刻みの全時系列)を収集して data/day-YYYY-MM-DD.json にコミットする。
# ライブの直近値(live-latest.json)は collect-live.yml が15分ごとに別途更新する。
on:
  schedule:
    # cron は UTC。毎時 :37（UTC 0〜13 ≒ JST 9〜22）に1回。
    # 履歴(attrWait)は1回で当日全体を取得できるため毎時1回で十分（負荷も軽減）。
    # 取りこぼしは data-freshness-check.yml が閉園前後に自己修復＋通知する。
    - cron: "37 0-13 * * *"
  workflow_dispatch: {} # 手動実行も可能（テスト用）

# data/ への push に必要
permissions:
  contents: write

# 収集ジョブが重ならないようにする
concurrency:
  group: collect-wait-times
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 履歴はライブ実測(CSV)から組み立てる（毎時のバックアップ実行）。
      - name: Rebuild today's history from live snapshots
        run: node scripts/build-history.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "変更なし（スキップ）"
          else
            git commit -m "data: collect wait times $(date -u +%Y-%m-%dT%H:%MZ)"
            # 他ワークフローと push が競合しうるので rebase してリトライ
            for i in 1 2 3 4 5; do
              git pull --rebase origin main && git push && break || { echo "push retry $i"; sleep 5; }
            done
          fi
